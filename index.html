<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Buddha AR</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#c8a84b;--gl:#f2d87a;--gd:#7a5c10;
  --bg:#080604;--txt:#ede0c4;--glow:rgba(200,168,75,.3)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Raleway',sans-serif;color:var(--txt)}

/* ── canvas: MUST be transparent so camera feed shows through in AR ── */
#c{position:fixed;inset:0;display:block;background:transparent!important}

/* ── loading ── */
#ls{position:fixed;inset:0;z-index:200;
  background:radial-gradient(ellipse at 50% 40%,#16100a 0%,#080604 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .9s}
#ls.out{opacity:0;pointer-events:none}
.wheel{width:96px;height:96px;position:relative;animation:spin 9s linear infinite}
.wheel svg{width:100%;height:100%}
@keyframes spin{to{transform:rotate(360deg)}}
.dot{width:10px;height:10px;background:var(--g);border-radius:50%;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  animation:throb 2s ease-in-out infinite;box-shadow:0 0 18px var(--g)}
@keyframes throb{0%,100%{transform:translate(-50%,-50%) scale(.7)}50%{transform:translate(-50%,-50%) scale(1.3)}}
#ls h1{font-family:'Cinzel',serif;font-size:clamp(1.3rem,5vw,1.9rem);
  letter-spacing:.25em;color:var(--g);text-shadow:0 0 28px var(--glow)}
#ls p{font-size:.75rem;letter-spacing:.14em;opacity:.45}
.bar{width:190px;height:2px;background:rgba(200,168,75,.18);border-radius:2px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--g),var(--gl));width:0;transition:width .3s}
#lt{font-size:.65rem;letter-spacing:.08em;opacity:.35}

/* ── main UI overlay ── */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:clamp(18px,5vw,32px) clamp(16px,5vw,28px) clamp(22px,6vw,38px)}

.topbar{display:flex;align-items:flex-start;justify-content:space-between}
.brand{font-family:'Cinzel',serif;font-size:clamp(.8rem,2.8vw,1.05rem);
  letter-spacing:.22em;color:var(--g);text-shadow:0 0 18px var(--glow);line-height:1.5}
.sub{font-size:.6rem;letter-spacing:.14em;opacity:.45;text-transform:uppercase}
.chip{background:rgba(0,0,0,.5);border:1px solid rgba(200,168,75,.38);
  border-radius:20px;padding:5px 14px;font-size:.65rem;letter-spacing:.1em;
  color:var(--gl);backdrop-filter:blur(10px)}

/* ── status toast ── */
#st{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cinzel',serif;font-size:clamp(.75rem,2.8vw,.9rem);letter-spacing:.1em;
  color:var(--txt);text-align:center;white-space:pre-line;
  background:rgba(0,0,0,.62);backdrop-filter:blur(12px);
  border:1px solid rgba(200,168,75,.22);border-radius:10px;
  padding:14px 22px;width:82vw;max-width:310px;
  opacity:0;transition:opacity .4s;pointer-events:none;z-index:20}
#st.on{opacity:1}

/* ── reticle hint ── */
#rh{position:fixed;bottom:145px;width:100%;text-align:center;
  font-size:.68rem;letter-spacing:.1em;color:var(--gl);
  opacity:0;transition:opacity .4s;pointer-events:none;z-index:20;
  text-shadow:0 1px 8px #000}
#rh.on{opacity:.85}

/* ── preview label ── */
#pl{position:fixed;top:50%;left:50%;
  transform:translate(-50%,calc(-50% - 115px));
  font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.22em;
  color:var(--g);text-transform:uppercase;opacity:0;
  transition:opacity 1s .5s;pointer-events:none;z-index:5;
  text-shadow:0 0 18px var(--glow)}
#pl.on{opacity:.5}

/* ── bottom controls ── */
.btns{display:flex;flex-direction:column;align-items:center;gap:11px;pointer-events:all}
.hints{display:flex;gap:16px;font-size:.6rem;letter-spacing:.06em;opacity:.4;
  flex-wrap:wrap;justify-content:center;margin-bottom:2px}

.btn-main{
  background:linear-gradient(135deg,var(--g),var(--gd));
  border:none;border-radius:50px;padding:14px 44px;
  font-family:'Cinzel',serif;font-size:.92rem;letter-spacing:.18em;color:#fff;
  cursor:pointer;box-shadow:0 4px 26px rgba(200,168,75,.45);
  transition:transform .18s,opacity .2s;-webkit-tap-highlight-color:transparent
}
.btn-main:active{transform:scale(.94)}
.btn-main:disabled{opacity:.3;cursor:not-allowed}

.btn-sec{
  display:none;
  background:rgba(0,0,0,.45);border:1px solid rgba(200,168,75,.38);
  border-radius:50px;padding:9px 26px;
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.13em;color:var(--gl);
  cursor:pointer;backdrop-filter:blur(10px);
  transition:opacity .2s;-webkit-tap-highlight-color:transparent
}
.btn-sec:active{opacity:.65}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="ls">
  <div class="wheel">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="46" stroke="rgba(200,168,75,.25)" stroke-width="1.5"/>
      <circle cx="50" cy="50" r="36" stroke="rgba(200,168,75,.15)" stroke-width="1"/>
      <!-- 8 spokes -->
      <line x1="50" y1="4"  x2="50" y2="18" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="50" y1="82" x2="50" y2="96" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="4"  y1="50" x2="18" y2="50" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="82" y1="50" x2="96" y2="50" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="26" y2="26" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="74" y1="74" x2="84" y2="84" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="84" y1="16" x2="74" y2="26" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="84" x2="26" y2="74" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="dot"></div>
  </div>
  <h1>BUDDHA&nbsp;AR</h1>
  <p>Stone Statue · WebXR Experience</p>
  <div class="bar"><div class="fill" id="lf"></div></div>
  <div id="lt">Initialising…</div>
</div>

<!-- Three.js canvas — transparent so real camera shows through -->
<canvas id="c"></canvas>

<!-- Status / hints -->
<div id="st"></div>
<div id="rh">✦ Point at a flat surface and tap to place ✦</div>
<div id="pl">3D Preview</div>

<!-- UI -->
<div id="ui">
  <div class="topbar">
    <div>
      <div class="brand">Buddha AR<br><span class="sub">Stone Statue · Vesak</span></div>
    </div>
    <div class="chip" id="chip">WebXR</div>
  </div>
  <div class="btns">
    <div class="hints">
      <span>👆 Drag = Rotate</span>
      <span>🤏 Pinch = Scale</span>
      <span>📍 Tap = Place</span>
    </div>
    <button class="btn-main" id="bAR"  disabled>Loading…</button>
    <button class="btn-sec"  id="bMove">↺ Move</button>
    <button class="btn-sec"  id="bExit">✕ Exit AR</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   REFS
═══════════════════════════════════════ */
const canvas=document.getElementById('c');
const lf=document.getElementById('lf');
const lt=document.getElementById('lt');
const ls=document.getElementById('ls');
const st=document.getElementById('st');
const rh=document.getElementById('rh');
const pl=document.getElementById('pl');
const bAR=document.getElementById('bAR');
const bMove=document.getElementById('bMove');
const bExit=document.getElementById('bExit');
const chip=document.getElementById('chip');

function prog(v,msg){lf.style.width=v+'%';if(msg)lt.textContent=msg}
function toast(msg,ms=0){st.textContent=msg;st.classList.add('on');if(ms)setTimeout(()=>st.classList.remove('on'),ms)}
function toastOff(){st.classList.remove('on')}

/* ═══════════════════════════════════════
   RENDERER
   alpha:true + setClearColor(0,0) = fully transparent background
   → the WebXR camera feed shows through automatically
═══════════════════════════════════════ */
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x000000,0);      // ← KEY: alpha 0 = see-through
renderer.xr.enabled=true;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
});

/* ═══════════════════════════════════════
   SCENE / CAMERA
═══════════════════════════════════════ */
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x080604,.045);

const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.005,200);
cam.position.set(0,.9,2.6);

/* ── Lighting — extra bright ambient so model looks good against real world ── */
scene.add(new THREE.AmbientLight(0xfff8ee,1.1));

const sun=new THREE.DirectionalLight(0xfffaf0,1.8);
sun.position.set(4,8,5);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=.1;sun.shadow.camera.far=30;
sun.shadow.camera.left=sun.shadow.camera.bottom=-5;
sun.shadow.camera.right=sun.shadow.camera.top=5;
scene.add(sun);

scene.add(Object.assign(new THREE.DirectionalLight(0x90b8ff,.45),{position:new THREE.Vector3(-4,3,-4)}));
const glow=new THREE.PointLight(0xc8a84b,1.2,10);glow.position.set(0,1.5,1.2);scene.add(glow);

/* ── Preview ground ── */
const ground=new THREE.Mesh(
  new THREE.CircleGeometry(4,64),
  new THREE.MeshStandardMaterial({color:0x141008,roughness:.95,transparent:true,opacity:.45})
);
ground.geometry.rotateX(-Math.PI/2);ground.receiveShadow=true;ground.position.y=-.001;
scene.add(ground);

/* ═══════════════════════════════════════
   STATUE GROUP
═══════════════════════════════════════ */
const sg=new THREE.Group();scene.add(sg);

/* ═══════════════════════════════════════
   RETICLE  (surface indicator ring)
═══════════════════════════════════════ */
const retGeo=new THREE.RingGeometry(.10,.13,48);retGeo.rotateX(-Math.PI/2);
const ret=new THREE.Mesh(retGeo,
  new THREE.MeshBasicMaterial({color:0xc8a84b,side:THREE.DoubleSide,transparent:true,opacity:.92}));
ret.matrixAutoUpdate=false;ret.visible=false;scene.add(ret);

const pulGeo=new THREE.RingGeometry(.10,.128,48);pulGeo.rotateX(-Math.PI/2);
const pulMat=new THREE.MeshBasicMaterial({color:0xf2d87a,transparent:true,opacity:0,side:THREE.DoubleSide});
const pulRing=new THREE.Mesh(pulGeo,pulMat);ret.add(pulRing);

/* ═══════════════════════════════════════
   LOAD MODEL  — loads from same folder as this HTML file
   Place stone_buddha_statue.glb next to this HTML on your server.
═══════════════════════════════════════ */
prog(5,'Loading 3D model…');
const loader=new THREE.GLTFLoader();
loader.load(
  'stone_buddha_statue.glb',
  gltf=>{
    prog(100,'Model ready ✦');
    const model=gltf.scene;

    /* Normalise to 1 m tall */
    const box=new THREE.Box3().setFromObject(model);
    const sz=new THREE.Vector3();box.getSize(sz);
    const s=1.0/Math.max(sz.x,sz.y,sz.z);
    model.scale.setScalar(s);

    /* Centre horizontally, sit exactly on y=0 */
    box.setFromObject(model);
    const c2=new THREE.Vector3();box.getCenter(c2);
    model.position.set(-c2.x,0,-c2.z);
    box.setFromObject(model);
    model.position.y=-box.min.y;

    model.traverse(n=>{if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});
    sg.add(model);

    setTimeout(()=>{
      ls.classList.add('out');
      setTimeout(()=>ls.style.display='none',1000);
      pl.classList.add('on');
      checkAR();
    },400);
  },
  xhr=>{
    if(xhr.lengthComputable)
      prog(5+Math.floor(xhr.loaded/xhr.total*93),
        `Loading… ${Math.round(xhr.loaded/1024)}kb / ${Math.round(xhr.total/1024)}kb`);
  },
  err=>{
    prog(100,'⚠ Load failed');
    lt.style.color='#ff7070';
    lt.textContent='Model not found. Make sure stone_buddha_statue.glb is in the same folder.';
    console.error(err);
  }
);

/* ═══════════════════════════════════════
   AR STATE
═══════════════════════════════════════ */
let isAR=false;
let placed=false;
let htSrc=null,htReq=false;
let session=null,ctrl=null;
let pulT=0;

/* ── Anchor: set ONCE at tap, never changed by render loop ── */
const aPos=new THREE.Vector3();
const aQuat=new THREE.Quaternion();
let uRotY=0;   // user Y-rotation added on top of anchor
let uScale=1;  // user scale

/* Apply anchor + user adjustments — absolute values, no drift ─────────
   We extract only Y from the hit-test quat so statue stays upright.  */
function anchor(){
  sg.position.copy(aPos);
  const e=new THREE.Euler().setFromQuaternion(aQuat,'YXZ');
  sg.rotation.set(0,e.y+uRotY,0);
  sg.scale.setScalar(uScale);
}

/* ── AR support ── */
async function checkAR(){
  if(!navigator.xr){
    bAR.textContent='⚠ WebXR unavailable';bAR.disabled=false;return;
  }
  const ok=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(!ok){
    bAR.textContent='⚠ AR not supported';bAR.disabled=false;
    toast('AR not supported on this device.\nEnjoy the 3D preview!',5000);
    return;
  }
  bAR.textContent='✦ Enter AR';bAR.disabled=false;
}

/* ── Start AR session ── */
async function startAR(){
  try{
    session=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['hit-test'],
      optionalFeatures:['dom-overlay'],
      domOverlay:{root:document.getElementById('ui')}
    });
    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(session);

    isAR=true;placed=false;htSrc=null;htReq=false;
    uRotY=0;uScale=1;

    /* Kill preview decorations */
    scene.fog=null;
    ground.visible=false;
    sg.visible=false;

    /* XR controller = screen tap */
    ctrl=renderer.xr.getController(0);
    ctrl.addEventListener('select',onTap);
    scene.add(ctrl);

    bAR.style.display='none';
    bExit.style.display='inline-block';
    bMove.style.display='none';
    pl.classList.remove('on');
    chip.textContent='● AR Live';
    toast('Move your phone slowly\nto detect a flat surface…');
    rh.classList.add('on');
    session.addEventListener('end',onEnd);
  }catch(e){
    toast('Could not start AR:\n'+e.message,4500);
    console.error(e);
  }
}

/* ── End AR ── */
function onEnd(){
  isAR=false;placed=false;htSrc=null;htReq=false;
  if(ctrl){ctrl.removeEventListener('select',onTap);scene.remove(ctrl);ctrl=null;}
  ret.visible=false;
  rh.classList.remove('on');
  scene.fog=new THREE.FogExp2(0x080604,.045);
  ground.visible=true;
  sg.visible=true;
  sg.position.set(0,0,0);sg.rotation.set(0,0,0);sg.scale.setScalar(1);
  bAR.style.display='inline-block';
  bExit.style.display='none';bMove.style.display='none';
  pl.classList.add('on');
  chip.textContent='WebXR';
  toastOff();
}

/* ── Tap → lock statue to surface ── */
function onTap(){
  /* Only place if reticle has found a surface and statue not yet placed */
  if(!ret.visible||placed)return;

  aPos.setFromMatrixPosition(ret.matrix);
  aQuat.setFromRotationMatrix(ret.matrix);
  anchor();  // apply ONCE

  placed=true;
  ret.visible=false;           // reticle gone — statue is fixed
  rh.classList.remove('on');
  sg.visible=true;
  toast('✦ Placed in the real world ✦\nPinch = scale   Drag = rotate',4500);
  bMove.style.display='inline-block';
}

/* ── Move button: re-enable reticle ── */
bMove.addEventListener('click',()=>{
  placed=false;sg.visible=false;ret.visible=false;
  rh.classList.add('on');bMove.style.display='none';
  toast('Scan a new surface\nthen tap to place');
});
bExit.addEventListener('click',()=>{if(session)session.end();});
bAR.addEventListener('click',startAR);

/* ═══════════════════════════════════════
   GESTURES
   AR placed: drag → uRotY, pinch → uScale, then anchor() re-applies absolute.
              This means statue NEVER drifts — position stays at aPos always.
   Preview:   direct rotation / scale on sg.
═══════════════════════════════════════ */
let dn=false,lx=0,pd=0,two=false;

canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch')return;
  dn=true;lx=e.clientX;
});
canvas.addEventListener('pointerup',()=>{dn=false;});
canvas.addEventListener('pointermove',e=>{
  if(!dn||e.pointerType==='touch')return;
  const dx=e.clientX-lx;lx=e.clientX;
  if(isAR&&placed){uRotY+=dx*.013;anchor();}
  else if(!isAR){sg.rotation.y+=dx*.013;}
});

canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dn=true;lx=e.touches[0].clientX;two=false;}
  if(e.touches.length===2){
    two=true;dn=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    pd=Math.hypot(dx,dy);
  }
},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(e.touches.length<2)two=false;
  if(e.touches.length===0)dn=false;
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(two&&e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.hypot(dx,dy);
    const f=1+(d-pd)*.006;
    if(isAR&&placed){uScale=Math.min(8,Math.max(.05,uScale*f));anchor();}
    else if(!isAR){sg.scale.multiplyScalar(f);sg.scale.clampScalar(.05,8);}
    pd=d;
  }else if(!two&&dn&&e.touches.length===1){
    const dx=e.touches[0].clientX-lx;lx=e.touches[0].clientX;
    if(isAR&&placed){uRotY+=dx*.013;anchor();}
    else if(!isAR){sg.rotation.y+=dx*.013;}
  }
},{passive:true});

/* ═══════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════ */
const clk=new THREE.Clock();

renderer.setAnimationLoop((ts,frame)=>{
  const dt=clk.getDelta();

  /* Preview mode */
  if(!isAR){
    sg.rotation.y+=dt*.2;
    const t=clk.elapsedTime;
    cam.position.set(Math.sin(t*.12)*2.5,.88+Math.sin(t*.08)*.14,Math.cos(t*.12)*2.5);
    cam.lookAt(0,.44,0);
    glow.intensity=.9+Math.sin(t*1.2)*.18;
  }

  /* AR mode */
  if(isAR&&frame){
    const ref=renderer.xr.getReferenceSpace();
    const ses=renderer.xr.getSession();

    /* Request hit-test source once */
    if(!htReq){
      ses.requestReferenceSpace('viewer')
        .then(vs=>ses.requestHitTestSource({space:vs})
        .then(src=>{htSrc=src;}));
      htReq=true;
    }

    /* Update reticle only while not yet placed */
    if(!placed&&htSrc){
      const hits=frame.getHitTestResults(htSrc);
      if(hits.length){
        const pose=hits[0].getPose(ref);
        ret.visible=true;
        ret.matrix.fromArray(pose.transform.matrix);
        pulT+=dt*3;
        pulRing.scale.setScalar(1+Math.sin(pulT)*.25);
        pulMat.opacity=(1-Math.sin(pulT))*.38;
      }else{
        ret.visible=false;
      }
    }
    /*
      WHEN PLACED: we do NOT update sg here at all.
      anchor() was called once at tap time and only again
      when the user adjusts gestures. sg stays world-locked.
    */
  }

  renderer.render(scene,cam);
});
</script>
</body>
</html>
