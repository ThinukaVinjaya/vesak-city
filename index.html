<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Buddha AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/loaders/GLTFLoader.min.js"></script>

  <style>
    body { margin:0; overflow:hidden; background:black; }
    #startBtn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 15px 30px; font-size: 20px; background: #4CAF50; color: white;
      border: none; border-radius: 50px; z-index: 100;
    }
    #status {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6);
      padding: 10px; border-radius: 8px; font-family: Arial;
    }
  </style>
</head>
<body>
  <button id="startBtn">Start Buddha AR</button>
  <div id="status">Waiting...</div>

  <script>
    const modelUrl = "https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb";
    let scene, camera, renderer, model, reticle;

    document.getElementById("startBtn").addEventListener("click", async () => {
      const btn = document.getElementById("startBtn");
      btn.style.display = "none";

      if (!navigator.xr) {
        alert("Your browser does not support WebXR AR");
        return;
      }

      try {
        const session = await navigator.xr.requestSession("immersive-ar", {
          requiredFeatures: ["hit-test"],
          optionalFeatures: ["dom-overlay"]
        });

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        await renderer.xr.setSession(session);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera();

        // Lights
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.8);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // Reticle
        reticle = new THREE.Mesh(
          new THREE.RingGeometry(0.2, 0.25, 32),
          new THREE.MeshBasicMaterial({ color: 0x00ff88, side: THREE.DoubleSide })
        );
        reticle.rotation.x = -Math.PI / 2;
        reticle.visible = false;
        scene.add(reticle);

        // Load Buddha
        const loader = new THREE.GLTFLoader();
        loader.load(modelUrl, (gltf) => {
          model = gltf.scene;
          model.scale.set(1.2, 1.2, 1.2);
          document.getElementById("status").innerHTML = "Tap on floor to place Buddha";
        });

        session.requestReferenceSpace("viewer").then((refSpace) => {
          session.requestHitTestSource({ space: refSpace }).then((hitSource) => {
            hitTestSource = hitSource;
          });
        });

        renderer.setAnimationLoop(animate);

      } catch (e) {
        console.error(e);
        alert("Cannot start AR: " + e.message);
      }
    });

    let hitTestSource = null;

    function animate(time, frame) {
      if (frame) {
        const refSpace = renderer.xr.getReferenceSpace();
        const hits = frame.getHitTestResults(hitTestSource);

        if (hits.length > 0) {
          const hit = hits[0];
          const pose = hit.getPose(refSpace);
          if (pose) {
            reticle.visible = true;
            reticle.position.fromArray(pose.transform.position);
            reticle.quaternion.fromArray(pose.transform.orientation);
          }
        } else {
          reticle.visible = false;
        }
      }

      renderer.render(scene, camera);
    }

    // Place model when tapping
    window.addEventListener("click", () => {
      if (model && reticle && reticle.visible) {
        const placedModel = model.clone();
        placedModel.position.copy(reticle.position);
        placedModel.quaternion.copy(reticle.quaternion);
        scene.add(placedModel);
      }
    });
  </script>
</body>
</html>
