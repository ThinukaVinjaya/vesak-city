<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Buddha AR</title>

  <!-- Three.js r134 — stable, has GLTFLoader on same version -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <!-- GLTFLoader matching r134 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #c {
      position: fixed; inset: 0;
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── LOADING ── */
    #ls {
      position: fixed; inset: 0; z-index: 300;
      background: radial-gradient(ellipse at center, #1a1408, #080502);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity .7s ease;
    }
    #ls.out { opacity: 0; pointer-events: none; }

    .ring {
      width: 90px; height: 90px;
      border: 2px solid #c9a84c; border-radius: 50%;
      position: relative;
      animation: spin 6s linear infinite;
      margin-bottom: 20px;
      box-shadow: 0 0 30px rgba(201,168,76,.4);
    }
    .ring::after {
      content: '';
      position: absolute; inset: 28px;
      background: #c9a84c; border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes blink { 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1.1)} }

    #ls h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem; letter-spacing: .3em;
      color: #c9a84c;
      text-shadow: 0 0 20px rgba(201,168,76,.5);
    }
    #ls p { margin-top: 6px; font-size: .75rem; letter-spacing: .1em; color: #a08040; }

    .bar { width: 180px; height: 2px; background: rgba(201,168,76,.15); margin-top: 18px; border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg,#c9a84c,#f0d080); width: 0%; transition: width .3s; }
    #lt { margin-top: 9px; font-size: .66rem; letter-spacing: .07em; color: #806030; text-align: center; max-width: 240px; }

    /* ── HUD ── */
    #hud {
      position: fixed; inset: 0; z-index: 200;
      pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 28px 22px 36px;
    }

    .h-top { display: flex; justify-content: space-between; align-items: flex-start; }

    .h-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem; letter-spacing: .18em;
      color: #c9a84c;
      text-shadow: 0 0 12px rgba(201,168,76,.5), 0 1px 4px rgba(0,0,0,.8);
      line-height: 1.5;
    }
    .h-sub { font-size: .6rem; letter-spacing: .1em; color: #9a7a3a; text-transform: uppercase; }

    .chip {
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(201,168,76,.35);
      border-radius: 20px; padding: 4px 12px;
      font-size: .62rem; letter-spacing: .1em;
      color: #f0d080;
      backdrop-filter: blur(8px);
      font-family: 'Cinzel', serif;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Cinzel', serif;
      font-size: .82rem; letter-spacing: .08em;
      color: #e8d5b0; text-align: center;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 10px;
      padding: 14px 20px;
      backdrop-filter: blur(12px);
      opacity: 0; transition: opacity .4s;
      pointer-events: none;
      width: 80vw; max-width: 300px;
      z-index: 250; line-height: 1.5;
    }
    #toast.show { opacity: 1; }

    /* ── SCAN RING ── */
    #scan {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 72px; height: 72px;
      border: 2px solid rgba(201,168,76,.75);
      border-radius: 50%;
      opacity: 0; transition: opacity .4s;
      pointer-events: none; z-index: 210;
      animation: scanpulse 1.2s ease-in-out infinite;
    }
    #scan.show { opacity: 1; }
    @keyframes scanpulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);    border-color: rgba(201,168,76,.75); }
      50%     { transform: translate(-50%,-50%) scale(1.35); border-color: rgba(201,168,76,.2); }
    }

    /* ── BUTTONS ── */
    .h-btns {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      pointer-events: all;
    }
    .hints {
      display: flex; gap: 14px;
      font-size: .6rem; letter-spacing: .05em;
      color: rgba(255,255,255,.4);
      text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }

    .btn-gold {
      background: linear-gradient(135deg, #c9a84c, #7a5c10);
      border: none; border-radius: 50px;
      padding: 14px 38px;
      font-family: 'Cinzel', serif;
      font-size: .9rem; letter-spacing: .16em;
      color: #fff; cursor: pointer;
      box-shadow: 0 4px 22px rgba(201,168,76,.4), 0 2px 8px rgba(0,0,0,.5);
      transition: transform .15s, opacity .2s;
    }
    .btn-gold:active { transform: scale(.95); }
    .btn-gold:disabled { opacity: .35; cursor: not-allowed; }

    .btn-ghost {
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 50px; padding: 8px 22px;
      font-family: 'Cinzel', serif;
      font-size: .68rem; letter-spacing: .1em;
      color: #f0d080; cursor: pointer;
      backdrop-filter: blur(8px);
      display: none; transition: background .2s;
    }
    .btn-ghost:active { background: rgba(100,70,0,.5); }

    .btn-row { display: flex; gap: 10px; }

    /* Error banner */
    #errBanner {
      display: none;
      position: fixed; bottom: 110px; left: 50%;
      transform: translateX(-50%);
      background: rgba(180,30,30,.85);
      border: 1px solid rgba(255,100,100,.4);
      border-radius: 10px; padding: 10px 18px;
      font-family: 'Cinzel', serif;
      font-size: .72rem; letter-spacing: .06em;
      color: #ffdede; text-align: center;
      max-width: 90vw; z-index: 260;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="ls">
  <div class="ring"></div>
  <h1>BUDDHA AR</h1>
  <p>Vesak Stone Statue</p>
  <div class="bar"><div class="bar-fill" id="bf"></div></div>
  <div id="lt">Initialising…</div>
</div>

<div id="scan"></div>
<div id="toast"></div>
<div id="errBanner"></div>

<canvas id="c"></canvas>

<div id="hud">
  <div class="h-top">
    <div>
      <div class="h-title">Buddha AR<br><span class="h-sub">Vesak Stone Statue</span></div>
    </div>
    <div class="chip" id="chip">WebXR</div>
  </div>
  <div class="h-btns">
    <div class="hints" id="hints">
      <span>🔆 Pinch to Scale</span>
      <span>👆 Drag to Rotate</span>
    </div>
    <button class="btn-gold" id="btnAR" disabled>Loading…</button>
    <div class="btn-row">
      <button class="btn-ghost" id="btnExit">✕ Exit AR</button>
      <button class="btn-ghost" id="btnMove">↺ Move</button>
    </div>
  </div>
</div>

<script>
// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.autoClear = true;
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ── Scene & Camera ────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 100);
camera.position.set(0, 1, 2.5);

// ── Lights ────────────────────────────────────────────────────────────────────
const ambient = new THREE.HemisphereLight(0xfff5e0, 0x443322, 0.9);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5d0, 1.5);
sun.position.set(2, 6, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.01;
sun.shadow.camera.far  = 10;
sun.shadow.camera.left = sun.shadow.camera.bottom = -1.5;
sun.shadow.camera.right = sun.shadow.camera.top   =  1.5;
sun.shadow.bias = -0.002;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
fill.position.set(-3, 2, -2);
scene.add(fill);

const glowLight = new THREE.PointLight(0xc9a84c, 0.8, 4);
glowLight.position.set(0, 0.8, 0.3);
scene.add(glowLight);

// ── Preview ground (non-AR only) ──────────────────────────────────────────────
const previewGround = new THREE.Mesh(
  (() => { const g = new THREE.CircleGeometry(3, 64); g.rotateX(-Math.PI / 2); return g; })(),
  new THREE.MeshStandardMaterial({ color: 0x1a1207, roughness: .95, transparent: true, opacity: .6 })
);
previewGround.receiveShadow = true;
previewGround.position.y = -0.001;
scene.add(previewGround);

// ── AR shadow receiver ────────────────────────────────────────────────────────
const arShadow = new THREE.Mesh(
  new THREE.PlaneGeometry(3, 3),
  new THREE.ShadowMaterial({ opacity: 0.35, depthWrite: false })
);
arShadow.rotation.x = -Math.PI / 2;
arShadow.receiveShadow = true;
arShadow.visible = false;
scene.add(arShadow);

// ── Statue group ──────────────────────────────────────────────────────────────
const statueGroup = new THREE.Group();
scene.add(statueGroup);

// ── Reticle ───────────────────────────────────────────────────────────────────
const retGeom = new THREE.RingGeometry(0.1, 0.13, 40);
retGeom.rotateX(-Math.PI / 2);
const reticle = new THREE.Mesh(retGeom,
  new THREE.MeshBasicMaterial({ color: 0xc9a84c, side: THREE.DoubleSide, transparent: true, opacity: .9 })
);
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

const haloGeom = new THREE.RingGeometry(0.1, 0.115, 40);
haloGeom.rotateX(-Math.PI / 2);
const haloMat = new THREE.MeshBasicMaterial({ color: 0xf0d080, transparent: true, opacity: 0, side: THREE.DoubleSide });
const halo = new THREE.Mesh(haloGeom, haloMat);
reticle.add(halo);

// ── Helpers ───────────────────────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('bf').style.width = pct + '%';
  if (msg) document.getElementById('lt').textContent = msg;
}

let toastTimer;
function toast(msg, dur = 0) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  if (dur > 0) toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

function showError(msg) {
  const b = document.getElementById('errBanner');
  b.textContent = msg;
  b.style.display = 'block';
  setTimeout(() => b.style.display = 'none', 6000);
}

// ── Load GLB ──────────────────────────────────────────────────────────────────
// Using a CORS proxy to avoid GitHub raw content CORS blocks
const GLB_URL = 'https://corsproxy.io/?url=https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb';

let modelLoaded = false;
setProgress(5, 'Checking loader…');

// Safety check — make sure GLTFLoader actually loaded
if (typeof THREE.GLTFLoader === 'undefined') {
  setProgress(0, '⚠ GLTFLoader failed to load. Check your internet connection.');
  showError('THREE.GLTFLoader not available — CDN may be blocked.');
} else {
  setProgress(10, 'Loading model…');

  const loader = new THREE.GLTFLoader();

  loader.load(
    GLB_URL,
    (gltf) => {
      const model = gltf.scene;

      // Auto-scale to fit 1 m tall
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      const s = 1.0 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(s);

      // Centre X/Z, sit on Y = 0
      box.setFromObject(model);
      const centre = new THREE.Vector3();
      box.getCenter(centre);
      model.position.x = -centre.x;
      model.position.z = -centre.z;
      box.setFromObject(model);
      model.position.y = -box.min.y;

      model.traverse(c => {
        if (c.isMesh) {
          c.castShadow    = true;
          c.receiveShadow = true;
          // Ensure materials render correctly
          if (c.material) {
            c.material.needsUpdate = true;
          }
        }
      });

      statueGroup.add(model);
      modelLoaded = true;
      setProgress(100, 'Model ready ✦');
      setTimeout(onLoadComplete, 400);
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        const p = 10 + Math.floor((xhr.loaded / xhr.total) * 87);
        const kb = Math.round(xhr.loaded / 1024);
        const total = Math.round(xhr.total / 1024);
        setProgress(p, `Downloading… ${kb} / ${total} kb`);
      }
    },
    (err) => {
      console.error('GLB load error:', err);
      // Try fallback: direct URL without proxy
      setProgress(20, 'Retrying direct URL…');
      tryDirectLoad();
    }
  );
}

// Fallback — try loading directly without proxy
function tryDirectLoad() {
  const DIRECT_URL = 'https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb';
  const loader2 = new THREE.GLTFLoader();
  loader2.load(
    DIRECT_URL,
    (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      model.scale.setScalar(1.0 / Math.max(size.x, size.y, size.z));
      box.setFromObject(model);
      const c = new THREE.Vector3();
      box.getCenter(c);
      model.position.set(-c.x, -box.min.y, -c.z);
      model.traverse(ch => {
        if (ch.isMesh) { ch.castShadow = true; ch.receiveShadow = true; }
      });
      statueGroup.add(model);
      modelLoaded = true;
      setProgress(100, 'Model ready ✦');
      setTimeout(onLoadComplete, 400);
    },
    null,
    (err2) => {
      console.error('Direct load also failed:', err2);
      document.getElementById('lt').textContent = '⚠ Could not load model. Check GitHub URL / CORS.';
      document.getElementById('lt').style.color = '#ff6060';
      setProgress(100);
      showError('Model load failed. The GitHub repo or file name may have changed.');
      // Still open loading screen so user can try AR without model
      setTimeout(onLoadComplete, 1500);
    }
  );
}

function onLoadComplete() {
  const ls = document.getElementById('ls');
  ls.classList.add('out');
  setTimeout(() => ls.style.display = 'none', 800);
  checkAR();
}

// ── AR Support ────────────────────────────────────────────────────────────────
const btnAR   = document.getElementById('btnAR');
const btnExit = document.getElementById('btnExit');
const btnMove = document.getElementById('btnMove');
const chip    = document.getElementById('chip');
const scanEl  = document.getElementById('scan');

async function checkAR() {
  if (!navigator.xr) {
    btnAR.textContent = '⚠ WebXR unavailable';
    btnAR.disabled = false;
    toast('WebXR not available. Enjoy the 3D preview!', 5000);
    return;
  }
  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    btnAR.textContent = '⚠ AR not supported';
    btnAR.disabled = false;
    toast('No AR support on this device.\nEnjoy the 3D preview!', 5000);
    return;
  }
  btnAR.textContent = '✦ Place on My Floor';
  btnAR.disabled = false;
}

// ── AR Session ────────────────────────────────────────────────────────────────
let isAR = false, placed = false, moving = false;
let arSession = null, controller = null;
let hitSrc = null, hitReq = false;
let pulseT = 0;

async function startAR() {
  if (!modelLoaded) { toast('Model still loading…', 2000); return; }

  try {
    arSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures : ['hit-test'],
      optionalFeatures : ['dom-overlay', 'light-estimation'],
      domOverlay       : { root: document.body }
    });

    // FIX: use 'local-floor' for correct real-world Y = 0 (floor level)
    // This is the key fix for proper floor placement
    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(arSession);

    isAR = true; placed = false; moving = false;
    hitSrc = null; hitReq = false;

    previewGround.visible = false;
    scene.background      = null;
    scene.fog             = null;
    arShadow.visible      = true;
    statueGroup.visible   = false;

    controller = renderer.xr.getController(0);
    controller.addEventListener('select', onTap);
    scene.add(controller);

    btnAR.style.display   = 'none';
    btnExit.style.display = 'inline-block';
    chip.textContent      = '● AR Active';

    scanEl.classList.add('show');
    toast('Point your camera at the floor<br>and move your phone slowly…');

    arSession.addEventListener('end', onAREnd);

  } catch (e) {
    console.error('AR start error:', e);
    toast('Could not start AR: ' + e.message, 5000);
  }
}

function onAREnd() {
  isAR = false; placed = false; moving = false;
  hitSrc = null; hitReq = false;

  previewGround.visible = true;
  arShadow.visible      = false;
  reticle.visible       = false;
  statueGroup.visible   = true;
  statueGroup.position.set(0, 0, 0);
  statueGroup.rotation.set(0, 0, 0);
  statueGroup.scale.set(1, 1, 1);

  scanEl.classList.remove('show');
  hideToast();

  btnAR.style.display   = 'inline-block';
  btnExit.style.display = 'none';
  btnMove.style.display = 'none';
  chip.textContent      = 'WebXR';
}

function onTap() {
  if (!reticle.visible) return;

  const pos = new THREE.Vector3();
  pos.setFromMatrixPosition(reticle.matrix);

  statueGroup.position.copy(pos);
  arShadow.position.set(pos.x, pos.y, pos.z);
  statueGroup.visible = true;
  reticle.visible     = false;
  scanEl.classList.remove('show');
  moving = false;
  btnMove.textContent = '↺ Move';

  if (!placed) {
    placed = true;
    btnMove.style.display = 'inline-block';
    toast('Buddha placed! ✦<br>Pinch to scale · Drag to rotate', 4000);
  } else {
    hideToast();
  }
}

btnMove.addEventListener('click', () => {
  if (!isAR) return;
  moving = true;
  reticle.visible = true;
  scanEl.classList.add('show');
  btnMove.textContent = '📍 Tap to place';
  toast('Aim at the floor and tap to place…');
});

btnAR.addEventListener('click', startAR);
btnExit.addEventListener('click', () => { if (arSession) arSession.end(); });

// ── Touch gestures: rotate + pinch-scale ──────────────────────────────────────
let pointerDown = false, lastPointerX = 0, prevPinchDist = 0;

canvas.addEventListener('pointerdown', e => { pointerDown = true; lastPointerX = e.clientX; });
canvas.addEventListener('pointerup', () => { pointerDown = false; });
canvas.addEventListener('pointermove', e => {
  if (!pointerDown) return;
  statueGroup.rotation.y += (e.clientX - lastPointerX) * 0.014;
  lastPointerX = e.clientX;
});
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    prevPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    statueGroup.scale.multiplyScalar(1 + (d - prevPinchDist) * 0.006);
    statueGroup.scale.clampScalar(0.05, 8);
    prevPinchDist = d;
  }
}, { passive: true });

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

renderer.setAnimationLoop((timestamp, frame) => {
  const dt = clock.getDelta();
  const et = clock.elapsedTime;

  if (!isAR) {
    statueGroup.visible   = modelLoaded;
    statueGroup.rotation.y += dt * 0.2;
    camera.position.set(
      Math.sin(et * 0.11) * 2.6,
      0.9 + Math.sin(et * 0.08) * 0.2,
      Math.cos(et * 0.11) * 2.6
    );
    camera.lookAt(0, 0.5, 0);
    glowLight.intensity = 0.8 + Math.sin(et * 1.1) * 0.2;
  }

  // WebXR hit-test for floor detection
  if (isAR && frame) {
    const refSpace = renderer.xr.getReferenceSpace();
    const session  = renderer.xr.getSession();

    if (!hitReq) {
      // FIX: request 'viewer' space for hit-test (correct approach)
      session.requestReferenceSpace('viewer').then(viewerSpace => {
        session.requestHitTestSource({ space: viewerSpace })
          .then(src => { hitSrc = src; })
          .catch(e => console.warn('Hit-test source failed:', e));
      }).catch(e => console.warn('Viewer space failed:', e));
      hitReq = true;
    }

    if (hitSrc) {
      const hits = frame.getHitTestResults(hitSrc);

      if (hits.length > 0) {
        const pose = hits[0].getPose(refSpace);

        if (pose) {
          reticle.matrix.fromArray(pose.transform.matrix);

          // Auto-place on first floor detection
          if (!placed) {
            const pos = new THREE.Vector3();
            pos.setFromMatrixPosition(reticle.matrix);
            statueGroup.position.copy(pos);
            arShadow.position.copy(pos);
            statueGroup.visible = true;
            placed = true;
            reticle.visible = false;
            scanEl.classList.remove('show');
            btnMove.style.display = 'inline-block';
            toast('Buddha is on your floor! ✦<br>Pinch to scale · Drag to rotate', 4500);
          }

          // Smooth follow while repositioning
          if (moving) {
            reticle.visible = true;
            const target = new THREE.Vector3();
            target.setFromMatrixPosition(reticle.matrix);
            statueGroup.position.lerp(target, 0.15);
            arShadow.position.copy(statueGroup.position);
          }

          // Pulse halo
          pulseT += dt * 2.2;
          halo.scale.setScalar(1 + Math.sin(pulseT) * 0.28);
          haloMat.opacity = Math.max(0, (1 - Math.sin(pulseT)) * 0.4);
        }
      } else {
        if (!placed) reticle.visible = false;
      }
    }
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
