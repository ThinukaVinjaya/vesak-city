<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Buddha AR Experience</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c9a84c;--gold-light:#f0d080;--deep:#0d0a06;--lotus:#e8d5b0}
    html,body{width:100%;height:100%;background:var(--deep);font-family:'Lato',sans-serif;color:var(--lotus);overflow:hidden}
    #three-canvas{position:fixed;inset:0}
    #loading-screen{position:fixed;inset:0;background:radial-gradient(#1a1408,#0d0a06);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
    #loading-screen.hidden{opacity:0;pointer-events:none}
    .mandala{width:110px;height:110px;border:2px solid var(--gold);border-radius:50%;animation:spin 8s linear infinite;margin-bottom:24px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #ui-overlay{position:fixed;inset:0;pointer-events:none;z-index:10;padding:28px 24px 36px;display:flex;flex-direction:column;justify-content:space-between}
    .btn-ar{background:linear-gradient(135deg,#c9a84c,#8b6914);border:none;border-radius:50px;padding:16px 50px;font-size:1.1rem;color:white;cursor:pointer}
    #status-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);padding:15px 25px;border-radius:8px;color:white;text-align:center;opacity:0;transition:0.4s}
    #status-msg.visible{opacity:1}
    #reticle-info{position:fixed;bottom:120px;width:100%;text-align:center;color:#f0d080;opacity:0}
    #reticle-info.visible{opacity:0.9}
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="mandala"></div>
    <h1 style="color:#c9a84c">BUDDHA AR</h1>
    <p>Loading Statue...</p>
  </div>

  <canvas id="three-canvas"></canvas>

  <div id="status-msg"></div>
  <div id="reticle-info">Point at flat surface → Tap screen to place Buddha</div>

  <div id="ui-overlay">
    <div style="color:#c9a84c;font-size:1.1rem">Vesak Stone Buddha</div>
    <div>
      <button class="btn-ar" id="btn-ar" disabled>Enter AR</button>
    </div>
  </div>

<script>
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('three-canvas'), antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(0, 1, 3);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(5, 10, 5);
scene.add(sun);

const statueGroup = new THREE.Group();
scene.add(statueGroup);

// Reticle
const reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.15, 0.2, 32),
  new THREE.MeshBasicMaterial({color: 0xc9a84c, side: THREE.DoubleSide})
);
reticle.rotation.x = -Math.PI/2;
reticle.visible = false;
scene.add(reticle);

const modelUrl = "https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb";

new THREE.GLTFLoader().load(modelUrl, (gltf) => {
  const model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const scale = 1.4 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(scale);
  model.traverse(n => { if(n.isMesh) n.castShadow = n.receiveShadow = true; });
  statueGroup.add(model);

  document.getElementById('loading-screen').classList.add('hidden');
  checkAR();
}, undefined, () => {
  alert("Failed to load Buddha model. Check internet.");
});

async function checkAR() {
  if (!navigator.xr) return alert("WebXR not supported");
  const supported = await navigator.xr.isSessionSupported('immersive-ar');
  if (supported) {
    document.getElementById('btn-ar').disabled = false;
    document.getElementById('btn-ar').textContent = "Start AR Camera";
  } else {
    alert("AR is not supported on this device/browser");
  }
}

let hitTestSource = null;
let isAR = false;

document.getElementById('btn-ar').onclick = async () => {
  try {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay']
    });

    await renderer.xr.setSession(session);
    isAR = true;
    document.getElementById('reticle-info').classList.add('visible');

    // Hit Test Setup
    const refSpace = await session.requestReferenceSpace('viewer');
    hitTestSource = await session.requestHitTestSource({ space: refSpace });

    session.addEventListener('end', () => {
      isAR = false;
      reticle.visible = false;
      document.getElementById('reticle-info').classList.remove('visible');
    });

  } catch (err) {
    console.error(err);
    alert("Camera failed to open.\n\n1. Use Chrome on Android\n2. Allow Camera permission\n3. Make sure page is on https://");
  }
};

// Place on tap
window.addEventListener('click', () => {
  if (isAR && reticle.visible) {
    statueGroup.position.copy(reticle.position);
    statueGroup.quaternion.copy(reticle.quaternion);
  }
});

renderer.setAnimationLoop((time, frame) => {
  if (isAR && frame && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const pose = hits[0].getPose(renderer.xr.getReferenceSpace());
      reticle.visible = true;
      reticle.position.fromArray(pose.transform.position);
      reticle.quaternion.fromArray(pose.transform.orientation);
    } else {
      reticle.visible = false;
    }
  }
  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
