<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Buddha AR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c9a84c;--gold-light:#f0d080;--deep:#0d0a06;--lotus:#e8d5b0;--glow:rgba(201,168,76,.35)}
    html,body{width:100%;height:100%;background:#0d0a06;font-family:'Lato',sans-serif;color:var(--lotus);overflow:hidden}

    /* Canvas fills screen — transparent so real camera shows through in AR */
    #three-canvas{position:fixed;inset:0;display:block;background:transparent}

    /* ── Loading ── */
    #loading-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a1408,#0d0a06);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .8s ease}
    #loading-screen.hidden{opacity:0;pointer-events:none}
    .mandala{width:100px;height:100px;border:2px solid var(--gold);border-radius:50%;position:relative;animation:spin 8s linear infinite;margin-bottom:20px;box-shadow:0 0 40px var(--glow)}
    .mandala::before{content:'';position:absolute;inset:12px;border:1px solid rgba(201,168,76,.4);border-radius:50%}
    .mandala-inner{position:absolute;inset:32px;background:var(--gold);border-radius:50%;animation:pulse 2s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.5;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
    #loading-screen h1{font-family:'Cinzel',serif;font-size:clamp(1.3rem,5vw,1.8rem);letter-spacing:.25em;color:var(--gold);text-shadow:0 0 30px var(--glow)}
    #loading-screen p{margin-top:6px;font-size:.8rem;letter-spacing:.1em;opacity:.5}
    .load-bar{width:180px;height:2px;background:rgba(201,168,76,.2);margin-top:20px;border-radius:2px;overflow:hidden}
    .load-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));width:0%;transition:width .3s ease}
    #load-text{margin-top:8px;font-size:.68rem;letter-spacing:.08em;opacity:.4}

    /* ── UI Overlay ── */
    #ui-overlay{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;justify-content:space-between;padding:28px 20px 34px}
    .header-title{font-family:'Cinzel',serif;font-size:clamp(.85rem,3vw,1.1rem);letter-spacing:.2em;color:var(--gold);text-shadow:0 0 20px var(--glow);line-height:1.4}
    .header-sub{font-size:.65rem;letter-spacing:.12em;opacity:.5;margin-top:2px;text-transform:uppercase}
    .badge{background:rgba(0,0,0,.35);border:1px solid rgba(201,168,76,.35);border-radius:20px;padding:5px 13px;font-size:.68rem;letter-spacing:.1em;color:var(--gold-light);backdrop-filter:blur(8px)}

    /* ── Status banner ── */
    #status-msg{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
      font-family:'Cinzel',serif;font-size:clamp(.8rem,3vw,.95rem);letter-spacing:.1em;
      color:var(--lotus);opacity:0;transition:opacity .4s;pointer-events:none;
      background:rgba(0,0,0,.6);padding:13px 22px;
      border:1px solid rgba(201,168,76,.25);border-radius:10px;
      backdrop-filter:blur(10px);width:80vw;max-width:320px;white-space:pre-line
    }
    #status-msg.visible{opacity:1}

    /* ── Reticle hint ── */
    #reticle-info{
      position:fixed;bottom:150px;width:100%;text-align:center;
      font-size:.7rem;letter-spacing:.1em;opacity:0;color:var(--gold-light);
      pointer-events:none;transition:opacity .4s;
      text-shadow:0 1px 6px rgba(0,0,0,.9)
    }
    #reticle-info.visible{opacity:.85}

    /* ── Preview label ── */
    #preview-label{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,calc(-50% - 120px));
      font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;
      color:var(--gold);opacity:0;transition:opacity 1s .4s;
      text-transform:uppercase;pointer-events:none;
      text-shadow:0 0 20px var(--glow)
    }
    #preview-label.visible{opacity:.5}

    /* ── Buttons ── */
    .controls{display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:all}
    .hint-row{display:flex;gap:14px;font-size:.63rem;letter-spacing:.06em;opacity:.45;flex-wrap:wrap;justify-content:center}
    .btn-ar{
      background:linear-gradient(135deg,#c9a84c,#7a5c10);
      border:none;border-radius:50px;padding:14px 42px;
      font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.16em;color:#fff;
      cursor:pointer;box-shadow:0 4px 28px rgba(201,168,76,.45);transition:transform .18s,opacity .2s
    }
    .btn-ar:active{transform:scale(.95)}
    .btn-ar:disabled{opacity:.35;cursor:not-allowed}
    .btn-secondary{
      background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.38);
      border-radius:50px;padding:9px 24px;
      font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.13em;color:var(--gold-light);
      cursor:pointer;display:none;backdrop-filter:blur(8px);
      transition:opacity .2s;pointer-events:all
    }
    .btn-secondary:active{opacity:.7}

    /* ── Particles ── */
    #particles{position:fixed;inset:0;pointer-events:none;z-index:2}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="mandala"><div class="mandala-inner"></div></div>
  <h1>BUDDHA AR</h1>
  <p>Stone Statue · WebXR Experience</p>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div id="load-text">Loading model…</div>
</div>

<canvas id="particles"></canvas>
<canvas id="three-canvas"></canvas>
<div id="status-msg"></div>
<div id="reticle-info">✦ Tap a flat surface to place the statue ✦</div>
<div id="preview-label">3D Preview</div>

<div id="ui-overlay">
  <div style="display:flex;align-items:flex-start;justify-content:space-between">
    <div>
      <div class="header-title">Buddha AR<br><span class="header-sub">Vesak Stone Statue</span></div>
    </div>
    <div class="badge" id="ar-badge">WebXR</div>
  </div>
  <div class="controls">
    <div class="hint-row">
      <span>🔆 Pinch to Scale</span>
      <span>👆 Drag to Rotate</span>
      <span>📍 Tap to Place</span>
    </div>
    <button class="btn-ar"       id="btn-ar"      disabled>Loading…</button>
    <button class="btn-secondary" id="btn-replace">↺ Reposition</button>
    <button class="btn-secondary" id="btn-stop"   >✕ Exit AR</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   PARTICLES  (preview only, hidden in AR)
═══════════════════════════════════════════════════════════ */
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  class P{
    constructor(){this.reset()}
    reset(){this.x=W*.5+(Math.random()-.5)*60;this.y=H*.72;this.vx=(Math.random()-.5)*.4;this.vy=-(Math.random()*.7+.3);this.life=0;this.max=120+Math.random()*80;this.r=Math.random()*3+1}
    update(){this.life++;this.x+=this.vx+Math.sin(this.life*.04)*.3;this.y+=this.vy;if(this.life>=this.max)this.reset()}
    draw(){const t=this.life/this.max,a=t<.2?t/.2:1-(t-.2)/.8;ctx.beginPath();ctx.arc(this.x,this.y,this.r*(1+t),0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${a*.18})`;ctx.fill()}
  }
  for(let i=0;i<40;i++){const p=new P();p.life=Math.floor(Math.random()*p.max);ps.push(p)}
  const particlesCanvas=document.getElementById('particles');
  let particlesVisible=true;
  window.setParticlesVisible=(v)=>{particlesVisible=v;if(!v)ctx.clearRect(0,0,W,H)};
  (function loop(){if(particlesVisible){ctx.clearRect(0,0,W,H);ps.forEach(p=>{p.update();p.draw()})}requestAnimationFrame(loop)})();
})();

/* ═══════════════════════════════════════════════════════════
   THREE.JS  RENDERER
   CRITICAL: alpha:true + setClearColor(0,0) = transparent bg
   so the real camera feed shows through in AR mode
═══════════════════════════════════════════════════════════ */
const canvas    = document.getElementById('three-canvas');
const loadFill  = document.getElementById('load-fill');
const loadTxt   = document.getElementById('load-text');
const loadScr   = document.getElementById('loading-screen');
const statusEl  = document.getElementById('status-msg');
const reticleEl = document.getElementById('reticle-info');
const previewLb = document.getElementById('preview-label');
const btnAR     = document.getElementById('btn-ar');
const btnStop   = document.getElementById('btn-stop');
const btnReplace= document.getElementById('btn-replace');
const arBadge   = document.getElementById('ar-badge');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);   // ← fully transparent clear = camera shows through
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, .01, 100);
camera.position.set(0,.9,2.4);

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

/* ── Lighting ── */
scene.add(new THREE.AmbientLight(0xfff5e0, 1.0));   // brighter ambient for AR
const sun=new THREE.DirectionalLight(0xfff0d0,1.6);
sun.position.set(3,6,4);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
const rim=new THREE.DirectionalLight(0xa0c8ff,.4);
rim.position.set(-3,2,-3);scene.add(rim);
const goldLight=new THREE.PointLight(0xc9a84c,1.0,8);
goldLight.position.set(0,1.5,1);scene.add(goldLight);

/* ── Preview-only ground ring ── */
const ground=new THREE.Mesh(
  new THREE.CircleGeometry(3,64),
  new THREE.MeshStandardMaterial({color:0x1a1408,roughness:.9,transparent:true,opacity:.45})
);
ground.geometry.rotateX(-Math.PI/2);ground.receiveShadow=true;ground.position.y=-.001;
scene.add(ground);

/* ── Preview scene fog (disabled in AR) ── */
scene.fog=new THREE.FogExp2(0x0d0a06,.04);

/* ── Statue group ── */
const statueGroup=new THREE.Group();
scene.add(statueGroup);

/* ── Reticle ── */
const rGeo=new THREE.RingGeometry(.09,.115,40);rGeo.rotateX(-Math.PI/2);
const reticle=new THREE.Mesh(
  rGeo,
  new THREE.MeshBasicMaterial({color:0xc9a84c,side:THREE.DoubleSide,transparent:true,opacity:.9})
);
reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);

// Pulse ring child
const pGeo=new THREE.RingGeometry(.09,.112,40);pGeo.rotateX(-Math.PI/2);
const pMat=new THREE.MeshBasicMaterial({color:0xf0d080,transparent:true,opacity:0,side:THREE.DoubleSide});
const pulseRing=new THREE.Mesh(pGeo,pMat);reticle.add(pulseRing);

/* ════════════════════════════════════════════════════════════
   LOAD GLB
════════════════════════════════════════════════════════════ */
const GLB_URL='https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb';

function setProgress(v,msg){
  loadFill.style.width=v+'%';
  if(msg)loadTxt.textContent=msg;
}

const loader=new THREE.GLTFLoader();
loader.load(
  GLB_URL,
  function(gltf){
    setProgress(100,'Model ready ✦');
    const model=gltf.scene;

    // Normalise height to 1 m
    const box=new THREE.Box3().setFromObject(model);
    const sz=new THREE.Vector3();box.getSize(sz);
    model.scale.setScalar(1.0/Math.max(sz.x,sz.y,sz.z));

    // Centre horizontally, floor at y=0
    box.setFromObject(model);
    const ctr=new THREE.Vector3();box.getCenter(ctr);
    model.position.set(-ctr.x,0,-ctr.z);
    box.setFromObject(model);
    model.position.y=-box.min.y;

    model.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true;}});
    statueGroup.add(model);

    setTimeout(()=>{
      loadScr.classList.add('hidden');
      setTimeout(()=>loadScr.style.display='none',900);
      previewLb.classList.add('visible');
      checkAR();
    },300);
  },
  xhr=>{
    if(xhr.lengthComputable){
      setProgress(10+Math.floor((xhr.loaded/xhr.total)*88),
        'Loading… '+Math.round(xhr.loaded/1024)+'kb / '+Math.round(xhr.total/1024)+'kb');
    }
  },
  err=>{
    console.error('GLB load failed:',err);
    setProgress(100,'⚠ Load failed');
    loadTxt.style.color='#ff6b6b';
    loadTxt.textContent='Model failed to load.';
  }
);

/* ════════════════════════════════════════════════════════════
   AR STATE
════════════════════════════════════════════════════════════ */
let isAR=false;
let placed=false;          // true → statue locked to world, never move again
let hitTestSource=null;
let hitTestReq=false;
let arSession=null;
let controller=null;
let pulseT=0;

/*
  FIXED WORLD ANCHOR
  When the user taps, we store EXACTLY where the hit surface was
  in the local (world) reference frame. We apply it ONCE and
  never touch statueGroup.position again — this is what makes it
  feel glued to the floor.
*/
const anchorPos=new THREE.Vector3();
const anchorQuat=new THREE.Quaternion();

// User adjustments ON TOP of anchor (only changed by gestures)
let userRotY=0;   // absolute Y angle the user has dialled in
let userScale=1;

function applyAnchor(){
  // Set position and base orientation from the hit-test anchor
  statueGroup.position.copy(anchorPos);
  // Only keep the Y component of the hit-test orientation (keeps statue upright)
  const euler=new THREE.Euler().setFromQuaternion(anchorQuat,'YXZ');
  statueGroup.rotation.set(0, euler.y+userRotY, 0);
  statueGroup.scale.setScalar(userScale);
}

function showStatus(msg,dur=0){
  statusEl.textContent=msg;statusEl.classList.add('visible');
  if(dur>0)setTimeout(()=>statusEl.classList.remove('visible'),dur);
}

/* ── Check AR Support ── */
async function checkAR(){
  if(!navigator.xr){btnAR.textContent='⚠ WebXR unavailable';btnAR.disabled=false;return;}
  const ok=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(!ok){
    btnAR.textContent='⚠ AR not supported';btnAR.disabled=false;
    showStatus('AR not supported on this device.\nEnjoy the 3D preview!',5000);
    return;
  }
  btnAR.textContent='✦ Enter AR';btnAR.disabled=false;
}

/* ── Start AR ── */
async function startAR(){
  try{
    arSession=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['hit-test'],
      optionalFeatures:['dom-overlay'],
      domOverlay:{root:document.getElementById('ui-overlay')}
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(arSession);

    // Reset
    isAR=true;placed=false;hitTestSource=null;hitTestReq=false;
    userRotY=0;userScale=1;

    // Kill preview decorations
    scene.fog=null;
    ground.visible=false;
    statueGroup.visible=false;   // hidden until placed
    window.setParticlesVisible(false);

    // XR controller = screen tap
    controller=renderer.xr.getController(0);
    controller.addEventListener('select',onSelect);
    scene.add(controller);

    btnAR.style.display='none';
    btnStop.style.display='inline-block';
    btnReplace.style.display='none';
    previewLb.classList.remove('visible');
    arBadge.textContent='● AR Live';
    showStatus('Slowly move your phone\nto detect a flat surface…');
    reticleEl.classList.add('visible');
    arSession.addEventListener('end',onAREnd);
  }catch(e){
    console.error(e);
    showStatus('Could not start AR:\n'+e.message,4000);
  }
}

/* ── End AR ── */
function onAREnd(){
  isAR=false;placed=false;hitTestSource=null;hitTestReq=false;

  if(controller){
    controller.removeEventListener('select',onSelect);
    scene.remove(controller);
    controller=null;
  }

  scene.fog=new THREE.FogExp2(0x0d0a06,.04);
  ground.visible=true;
  reticle.visible=false;
  reticleEl.classList.remove('visible');

  statueGroup.visible=true;
  statueGroup.position.set(0,0,0);
  statueGroup.rotation.set(0,0,0);
  statueGroup.scale.setScalar(1);

  btnAR.style.display='inline-block';
  btnStop.style.display='none';
  btnReplace.style.display='none';
  previewLb.classList.add('visible');
  arBadge.textContent='WebXR';
  statusEl.classList.remove('visible');
  window.setParticlesVisible(true);
}

/* ── Tap → Lock statue to surface ── */
function onSelect(){
  // Only act when reticle is showing a valid surface
  if(!reticle.visible||placed)return;

  // Extract world-space position and orientation from the reticle matrix
  anchorPos.setFromMatrixPosition(reticle.matrix);
  anchorQuat.setFromRotationMatrix(reticle.matrix);

  // Apply ONCE — after this we never update from hit-test again
  applyAnchor();

  placed=true;
  reticle.visible=false;         // stop reticle immediately
  reticleEl.classList.remove('visible');
  statueGroup.visible=true;
  showStatus('✦ Statue placed in real world ✦\nPinch to scale  ·  Drag to rotate',4500);
  btnReplace.style.display='inline-block';
}

/* ── Reposition button ── */
btnReplace.addEventListener('click',()=>{
  placed=false;
  statueGroup.visible=false;
  reticle.visible=false;
  reticleEl.classList.add('visible');
  btnReplace.style.display='none';
  showStatus('Move phone to a new surface\nthen tap to place');
});

btnAR.addEventListener('click',startAR);
btnStop.addEventListener('click',()=>{if(arSession)arSession.end();});

/* ════════════════════════════════════════════════════════════
   GESTURES
   Preview mode: drag rotates, pinch scales statueGroup directly.
   AR placed mode: drag adds to userRotY, pinch adds to userScale,
   then applyAnchor() re-derives the full transform — so the
   statue NEVER drifts from its anchor point.
════════════════════════════════════════════════════════════ */
let isDown=false,lastX=0;
let touch1={x:0,y:0},touch2={x:0,y:0},prevDist=0,twoFinger=false;

canvas.addEventListener('pointerdown',e=>{
  if(e.pointerType==='touch')return; // handled by touchstart
  isDown=true;lastX=e.clientX;
});
canvas.addEventListener('pointerup',()=>{isDown=false;});
canvas.addEventListener('pointermove',e=>{
  if(!isDown||e.pointerType==='touch')return;
  const dx=e.clientX-lastX;lastX=e.clientX;
  if(isAR&&placed){userRotY+=dx*.012;applyAnchor();}
  else if(!isAR){statueGroup.rotation.y+=dx*.012;}
});

canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDown=true;lastX=e.touches[0].clientX;}
  if(e.touches.length===2){
    twoFinger=true;isDown=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    prevDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});

canvas.addEventListener('touchend',e=>{
  if(e.touches.length<2)twoFinger=false;
  if(e.touches.length===0)isDown=false;
},{passive:true});

canvas.addEventListener('touchmove',e=>{
  if(twoFinger&&e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    const factor=1+(d-prevDist)*.006;
    if(isAR&&placed){
      userScale=Math.max(.05,Math.min(6,userScale*factor));
      applyAnchor();
    }else if(!isAR){
      statueGroup.scale.multiplyScalar(factor);
      statueGroup.scale.clampScalar(.05,6);
    }
    prevDist=d;
  } else if(!twoFinger&&e.touches.length===1&&isDown){
    const dx=e.touches[0].clientX-lastX;lastX=e.touches[0].clientX;
    if(isAR&&placed){userRotY+=dx*.012;applyAnchor();}
    else if(!isAR){statueGroup.rotation.y+=dx*.012;}
  }
},{passive:true});

/* ════════════════════════════════════════════════════════════
   RENDER LOOP
════════════════════════════════════════════════════════════ */
const clock=new THREE.Clock();

renderer.setAnimationLoop((ts,frame)=>{
  const dt=clock.getDelta();

  /* ── Preview mode (no AR session) ── */
  if(!isAR){
    statueGroup.rotation.y+=dt*.22;
    camera.position.set(
      Math.sin(clock.elapsedTime*.13)*2.4,
      .85+Math.sin(clock.elapsedTime*.09)*.15,
      Math.cos(clock.elapsedTime*.13)*2.4
    );
    camera.lookAt(0,.45,0);
    goldLight.intensity=.8+Math.sin(clock.elapsedTime*1.1)*.15;
  }

  /* ── AR mode ── */
  if(isAR&&frame){
    const refSpace=renderer.xr.getReferenceSpace();
    const session=renderer.xr.getSession();

    // Request hit-test source once per session
    if(!hitTestReq){
      session.requestReferenceSpace('viewer').then(vs=>{
        session.requestHitTestSource({space:vs}).then(src=>{hitTestSource=src;});
      });
      hitTestReq=true;
    }

    // Update reticle ONLY while statue is not yet placed
    if(!placed&&hitTestSource){
      const hits=frame.getHitTestResults(hitTestSource);
      if(hits.length>0){
        const pose=hits[0].getPose(refSpace);
        reticle.visible=true;
        reticle.matrix.fromArray(pose.transform.matrix);
        // Pulse animation
        pulseT+=dt*2.8;
        pulseRing.scale.setScalar(1+Math.sin(pulseT)*.28);
        pMat.opacity=(1-Math.sin(pulseT))*.4;
      }else{
        reticle.visible=false;
      }
    }
    /*
      IMPORTANT: when placed===true we do NOT touch statueGroup at all here.
      applyAnchor() was already called once at tap time (and again only if the
      user adjusts rotation/scale via gestures). This is what makes the statue
      stay fixed in the real world.
    */
  }

  renderer.render(scene,camera);
});
</script>
