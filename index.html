<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vesak WebXR AR Scene</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background: #000; color: #fff; }
    #info { position: absolute; left: 16px; top: 16px; z-index: 10; max-width: 320px; background: rgba(0,0,0,0.65); padding: 12px 14px; border-radius: 12px; line-height: 1.5; }
    #message { margin: 0 0 8px; }
    #buttonFallback { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; border: 1px solid #555; background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="info">
    <p id="message">Tap the button to start AR, then tap the real-world surface to place the Vesak scene.</p>
    <div id="buttonContainer"></div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
