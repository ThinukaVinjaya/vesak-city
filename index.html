<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Buddha AR</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

#info{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    z-index:10;
    background:rgba(0,0,0,0.5);
    padding:10px 20px;
    border-radius:20px;
    text-align:center;
}

#btn{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    padding:14px 30px;
    border:none;
    border-radius:40px;
    background:#c8a84b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}
</style>
</head>
<body>

<div id="info">
    Buddha AR<br>
    Move phone slowly to detect surface
</div>

<button id="btn">Enter AR</button>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js';

import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/loaders/GLTFLoader.js';

import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/webxr/ARButton.js';

let camera, scene, renderer;
let controller;

let reticle;
let hitTestSource = null;
let hitTestSourceRequested = false;

let statue;

init();
animate();

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth/window.innerHeight,
        0.01,
        20
    );

    renderer = new THREE.WebGLRenderer({
        antialias:true,
        alpha:true
    });

    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.xr.enabled = true;

    renderer.setClearColor(0x000000,0);

    document.body.appendChild(renderer.domElement);

    // LIGHTS

    const hemi = new THREE.HemisphereLight(0xffffff,0xbbbbff,1.5);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff,1.2);
    dir.position.set(5,10,7);
    scene.add(dir);

    // RETICLE

    const ringGeo = new THREE.RingGeometry(0.1,0.15,32);
    ringGeo.rotateX(-Math.PI/2);

    reticle = new THREE.Mesh(
        ringGeo,
        new THREE.MeshBasicMaterial({
            color:0xc8a84b
        })
    );

    reticle.matrixAutoUpdate = false;
    reticle.visible = false;

    scene.add(reticle);

    // LOAD MODEL

    const loader = new GLTFLoader();

    loader.load(
        'stone_buddha_statue.glb',

        function(gltf){

            statue = gltf.scene;

            statue.scale.set(0.5,0.5,0.5);

            statue.visible = false;

            scene.add(statue);

            document.getElementById('info').innerHTML =
                'Model Loaded<br>Tap Enter AR';

        },

        undefined,

        function(error){

            console.error(error);

            document.getElementById('info').innerHTML =
                'Model Failed To Load';
        }
    );

    // CONTROLLER

    controller = renderer.xr.getController(0);

    controller.addEventListener('select', onSelect);

    scene.add(controller);

    // AR BUTTON

    const arButton = ARButton.createButton(renderer,{
        requiredFeatures:['hit-test'],
        optionalFeatures:['dom-overlay'],
        domOverlay:{root:document.body}
    });

    arButton.style.display = 'none';

    document.body.appendChild(arButton);

    document.getElementById('btn').addEventListener('click',()=>{

        arButton.click();

        document.getElementById('btn').style.display='none';

    });

    // RESIZE

    window.addEventListener('resize',onWindowResize);

}

function onSelect(){

    if(reticle.visible && statue){

        const position = new THREE.Vector3();
        position.setFromMatrixPosition(reticle.matrix);

        statue.position.copy(position);

        statue.visible = true;

    }

}

function onWindowResize(){

    camera.aspect = window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

}

function animate(){

    renderer.setAnimationLoop(render);

}

function render(timestamp,frame){

    if(frame){

        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if(hitTestSourceRequested === false){

            session.requestReferenceSpace('viewer').then(function(referenceSpace){

                session.requestHitTestSource({
                    space: referenceSpace
                }).then(function(source){

                    hitTestSource = source;

                });

            });

            session.addEventListener('end',function(){

                hitTestSourceRequested = false;
                hitTestSource = null;

            });

            hitTestSourceRequested = true;
        }

        if(hitTestSource){

            const hitTestResults = frame.getHitTestResults(hitTestSource);

            if(hitTestResults.length){

                const hit = hitTestResults[0];

                const pose = hit.getPose(referenceSpace);

                reticle.visible = true;

                reticle.matrix.fromArray(
                    pose.transform.matrix
                );

            }else{

                reticle.visible = false;

            }
        }
    }

    renderer.render(scene,camera);

}

</script>

</body>
</html>
