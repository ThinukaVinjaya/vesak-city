<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Buddha AR Experience</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c9a84c;--gold-light:#f0d080;--deep:#0d0a06;--lotus:#e8d5b0;--glow:rgba(201,168,76,.35)}
    html,body{width:100%;height:100%;background:var(--deep);font-family:'Lato',sans-serif;color:var(--lotus);overflow:hidden}
    #three-canvas{position:fixed;inset:0;display:block}
    #loading-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a1408 0%,#0d0a06 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .8s ease}
    #loading-screen.hidden{opacity:0;pointer-events:none}
    .mandala{width:110px;height:110px;border:2px solid var(--gold);border-radius:50%;position:relative;animation:spin 8s linear infinite;margin-bottom:24px;box-shadow:0 0 40px var(--glow)}
    .mandala::before{content:'';position:absolute;inset:12px;border:1px solid rgba(201,168,76,.4);border-radius:50%}
    .mandala-inner{position:absolute;inset:35px;background:var(--gold);border-radius:50%;animation:pulse 2s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.6;transform:scale(.9)}50%{opacity:1;transform:scale(1.1)}}
    #loading-screen h1{font-family:'Cinzel',serif;font-size:clamp(1.4rem,5vw,2rem);letter-spacing:.25em;color:var(--gold);text-shadow:0 0 30px var(--glow)}
    #loading-screen p{margin-top:8px;font-size:.82rem;letter-spacing:.1em;opacity:.55}
    .load-bar{width:200px;height:2px;background:rgba(201,168,76,.2);margin-top:22px;border-radius:2px;overflow:hidden}
    .load-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));width:0%;transition:width .35s ease}
    #load-text{margin-top:10px;font-size:.7rem;letter-spacing:.08em;opacity:.4}
    #ui-overlay{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;justify-content:space-between;padding:28px 24px 36px}
    .header-title{font-family:'Cinzel',serif;font-size:clamp(.9rem,3vw,1.2rem);letter-spacing:.2em;color:var(--gold);text-shadow:0 0 20px var(--glow);line-height:1.4}
    .header-sub{font-size:.68rem;letter-spacing:.12em;opacity:.5;margin-top:3px;text-transform:uppercase}
    .badge{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);border-radius:20px;padding:5px 14px;font-size:.7rem;letter-spacing:.1em;color:var(--gold-light);backdrop-filter:blur(6px)}
    #status-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-family:'Cinzel',serif;font-size:clamp(.85rem,3vw,1rem);letter-spacing:.1em;color:var(--lotus);opacity:0;transition:opacity .5s;pointer-events:none;text-shadow:0 2px 12px rgba(0,0,0,.8);background:rgba(13,10,6,.65);padding:14px 24px;border:1px solid rgba(201,168,76,.2);border-radius:8px;backdrop-filter:blur(8px);width:80vw;max-width:340px}
    #status-msg.visible{opacity:1}
    #reticle-info{position:fixed;bottom:155px;width:100%;text-align:center;font-size:.72rem;letter-spacing:.1em;opacity:0;color:var(--gold-light);pointer-events:none;transition:opacity .5s}
    #reticle-info.visible{opacity:.75}
    .preview-label{position:fixed;top:50%;left:50%;transform:translate(-50%,calc(-50% - 130px));font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;color:var(--gold);opacity:0;transition:opacity 1s .5s;text-transform:uppercase;pointer-events:none}
    .preview-label.visible{opacity:.55}
    .controls{display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:all}
    .btn-ar{background:linear-gradient(135deg,#c9a84c,#8b6914);border:none;border-radius:50px;padding:15px 44px;font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.18em;color:#fff;cursor:pointer;box-shadow:0 4px 30px rgba(201,168,76,.4);transition:transform .2s}
    .btn-ar:active{transform:scale(.96)}
    .btn-ar:disabled{opacity:.4;cursor:not-allowed}
    .btn-stop{background:rgba(139,99,50,.2);border:1px solid rgba(201,168,76,.35);border-radius:50px;padding:9px 26px;font-family:'Cinzel',serif;font-size:.76rem;letter-spacing:.14em;color:var(--gold-light);cursor:pointer;display:none;backdrop-filter:blur(6px)}
    .hint-row{display:flex;gap:18px;font-size:.67rem;letter-spacing:.07em;opacity:.4}
    .particles-canvas{position:fixed;inset:0;pointer-events:none;z-index:2}
  </style>
</head>
<body>
<div id="loading-screen">
  <div class="mandala"><div class="mandala-inner"></div></div>
  <h1>BUDDHA AR</h1>
  <p>Stone Statue · WebXR Experience</p>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div id="load-text">Loading model…</div>
</div>
<canvas class="particles-canvas" id="particles"></canvas>
<canvas id="three-canvas"></canvas>
<div id="status-msg"></div>
<div id="reticle-info">✦ Tap on the surface to place the statue ✦</div>
<div class="preview-label" id="preview-label">3D Preview</div>
<div id="ui-overlay">
  <div style="display:flex;align-items:flex-start;justify-content:space-between">
    <div>
      <div class="header-title">Buddha AR<br><span class="header-sub">Vesak Stone Statue</span></div>
    </div>
    <div class="badge" id="ar-badge">WebXR</div>
  </div>
  <div class="controls">
    <div class="hint-row">
      <span>🔆 Pinch to Scale</span>
      <span>👆 Drag to Rotate</span>
      <span>📍 Tap to Place</span>
    </div>
    <button class="btn-ar" id="btn-ar" disabled>Loading…</button>
    <button class="btn-stop" id="btn-stop">✕ Exit AR</button>
  </div>
</div>
<script>
// Particles
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  class P{constructor(){this.reset();}reset(){this.x=W*.5+(Math.random()-.5)*60;this.y=H*.72;this.vx=(Math.random()-.5)*.4;this.vy=-(Math.random()*.7+.3);this.life=0;this.max=120+Math.random()*80;this.r=Math.random()*3+1;}update(){this.life++;this.x+=this.vx+Math.sin(this.life*.04)*.3;this.y+=this.vy;if(this.life>=this.max)this.reset();}draw(){const t=this.life/this.max,a=t<.2?t/.2:1-(t-.2)/.8;ctx.beginPath();ctx.arc(this.x,this.y,this.r*(1+t),0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${a*.18})`;ctx.fill();}}
  for(let i=0;i<40;i++){const p=new P();p.life=Math.floor(Math.random()*p.max);ps.push(p);}
  (function loop(){ctx.clearRect(0,0,W,H);ps.forEach(p=>{p.update();p.draw();});requestAnimationFrame(loop);})();
})();

const canvas=document.getElementById('three-canvas');
const loadFill=document.getElementById('load-fill');
const loadTxt=document.getElementById('load-text');
const loadScr=document.getElementById('loading-screen');
const statusEl=document.getElementById('status-msg');
const reticleEl=document.getElementById('reticle-info');
const previewLb=document.getElementById('preview-label');
const btnAR=document.getElementById('btn-ar');
const btnStop=document.getElementById('btn-stop');
const arBadge=document.getElementById('ar-badge');

const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0d0a06,.04);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,100);
camera.position.set(0,.9,2.4);

window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});

scene.add(new THREE.AmbientLight(0xfff5e0,.7));
const sun=new THREE.DirectionalLight(0xfff0d0,1.4);
sun.position.set(3,6,4);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun);
const rim=new THREE.DirectionalLight(0x80c0ff,.3);rim.position.set(-3,2,-3);scene.add(rim);
const goldLight=new THREE.PointLight(0xc9a84c,.9,6);goldLight.position.set(0,1.2,1);scene.add(goldLight);

const ground=new THREE.Mesh(new THREE.CircleGeometry(3,64),new THREE.MeshStandardMaterial({color:0x1a1408,roughness:.9,transparent:true,opacity:.5}));
ground.geometry.rotateX(-Math.PI/2);ground.receiveShadow=true;ground.position.y=-.001;scene.add(ground);

const statueGroup=new THREE.Group();scene.add(statueGroup);

// Reticle
const rGeo=new THREE.RingGeometry(.08,.1,36);rGeo.rotateX(-Math.PI/2);
const reticle=new THREE.Mesh(rGeo,new THREE.MeshBasicMaterial({color:0xc9a84c,side:THREE.DoubleSide,transparent:true,opacity:.85}));
reticle.matrixAutoUpdate=false;reticle.visible=false;scene.add(reticle);
const pGeo=new THREE.RingGeometry(.08,.095,36);pGeo.rotateX(-Math.PI/2);
const pMat=new THREE.MeshBasicMaterial({color:0xf0d080,transparent:true,opacity:0,side:THREE.DoubleSide});
const pulseRing=new THREE.Mesh(pGeo,pMat);reticle.add(pulseRing);

// Load the real GLB model
const GLB_URL='https://raw.githubusercontent.com/ThinukaVinjaya/vesakmodels/main/stone_buddha_statue.glb';

function setProgress(v,msg){
  loadFill.style.width=v+'%';
  if(msg) loadTxt.textContent=msg;
}

const loader=new THREE.GLTFLoader();
loader.load(
  GLB_URL,
  function(gltf){
    setProgress(100,'Model ready ✦');
    const model=gltf.scene;

    // Scale to fit ~1m
    const box=new THREE.Box3().setFromObject(model);
    const size=new THREE.Vector3();
    box.getSize(size);
    const s=1.0/Math.max(size.x,size.y,size.z);
    model.scale.setScalar(s);

    // Centre and sit on ground
    box.setFromObject(model);
    const ctr=new THREE.Vector3();
    box.getCenter(ctr);
    model.position.x=-ctr.x;
    model.position.z=-ctr.z;
    box.setFromObject(model);
    model.position.y=-box.min.y;

    model.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true;}});
    statueGroup.add(model);

    setTimeout(()=>{
      loadScr.classList.add('hidden');
      setTimeout(()=>loadScr.style.display='none',900);
      previewLb.classList.add('visible');
      checkAR();
    },300);
  },
  function(xhr){
    if(xhr.lengthComputable){
      const p=10+Math.floor((xhr.loaded/xhr.total)*88);
      setProgress(p,'Loading… '+Math.round(xhr.loaded/1024)+'kb / '+Math.round(xhr.total/1024)+'kb');
    }
  },
  function(err){
    console.error('GLB load failed:',err);
    setProgress(100,'⚠ Load failed');
    loadTxt.style.color='#ff6b6b';
    loadTxt.textContent='Failed to load model. Check console.';
  }
);

// AR
let isAR=false,placed=false,hitTestSource=null,hitTestReq=false,arSession=null,controller=null,pulseT=0;

function showStatus(msg,dur=0){statusEl.textContent=msg;statusEl.classList.add('visible');if(dur>0)setTimeout(()=>statusEl.classList.remove('visible'),dur);}

async function checkAR(){
  if(!navigator.xr){btnAR.textContent='⚠ WebXR unavailable';btnAR.disabled=false;return;}
  const ok=await navigator.xr.isSessionSupported('immersive-ar').catch(()=>false);
  if(!ok){btnAR.textContent='⚠ AR not supported';btnAR.disabled=false;showStatus('AR not supported on this device. Enjoy the 3D preview!',5000);return;}
  btnAR.textContent='✦ Enter AR';btnAR.disabled=false;
}

async function startAR(){
  try{
    arSession=await navigator.xr.requestSession('immersive-ar',{requiredFeatures:['hit-test'],optionalFeatures:['dom-overlay'],domOverlay:{root:document.getElementById('ui-overlay')}});
    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(arSession);
    isAR=true;placed=false;hitTestSource=null;hitTestReq=false;
    scene.fog=null;ground.visible=false;
    controller=renderer.xr.getController(0);
    controller.addEventListener('select',onSelect);
    scene.add(controller);
    btnAR.style.display='none';btnStop.style.display='inline-block';
    previewLb.classList.remove('visible');arBadge.textContent='● AR Live';
    showStatus('Move your phone slowly to scan the surface…');
    reticleEl.classList.add('visible');
    arSession.addEventListener('end',onAREnd);
  }catch(e){console.error(e);showStatus('Could not start AR: '+e.message,4000);}
}

function onAREnd(){
  isAR=false;placed=false;hitTestSource=null;hitTestReq=false;
  scene.fog=new THREE.FogExp2(0x0d0a06,.04);ground.visible=true;
  reticle.visible=false;reticleEl.classList.remove('visible');
  statueGroup.position.set(0,0,0);statueGroup.rotation.set(0,0,0);
  btnAR.style.display='inline-block';btnStop.style.display='none';
  previewLb.classList.add('visible');arBadge.textContent='WebXR';
  statusEl.classList.remove('visible');
}

function onSelect(){
  if(!reticle.visible)return;
  statueGroup.position.setFromMatrixPosition(reticle.matrix);
  if(!placed){placed=true;reticleEl.classList.remove('visible');showStatus('Statue placed ✦  Pinch to scale · Drag to rotate',3500);}
}

btnAR.addEventListener('click',startAR);
btnStop.addEventListener('click',()=>{if(arSession)arSession.end();});

let isDown=false,lastX=0,prevDist=0;
canvas.addEventListener('pointerdown',e=>{isDown=true;lastX=e.clientX;});
canvas.addEventListener('pointerup',()=>{isDown=false;});
canvas.addEventListener('pointermove',e=>{if(!isDown||isAR)return;statueGroup.rotation.y+=(e.clientX-lastX)*.012;lastX=e.clientX;});
canvas.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;prevDist=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);statueGroup.scale.multiplyScalar(1+(d-prevDist)*.005);statueGroup.scale.clampScalar(.05,5);prevDist=d;}},{passive:true});

const clock=new THREE.Clock();
renderer.setAnimationLoop((ts,frame)=>{
  const dt=clock.getDelta();
  if(!isAR){
    statueGroup.rotation.y+=dt*.22;
    camera.position.set(Math.sin(clock.elapsedTime*.13)*2.4,.85+Math.sin(clock.elapsedTime*.09)*.15,Math.cos(clock.elapsedTime*.13)*2.4);
    camera.lookAt(0,.45,0);
    goldLight.intensity=.8+Math.sin(clock.elapsedTime*1.1)*.15;
  }
  if(isAR&&frame){
    const refSpace=renderer.xr.getReferenceSpace(),session=renderer.xr.getSession();
    if(!hitTestReq){session.requestReferenceSpace('viewer').then(vs=>session.requestHitTestSource({space:vs}).then(src=>{hitTestSource=src;}));hitTestReq=true;}
    if(hitTestSource){
      const hits=frame.getHitTestResults(hitTestSource);
      if(hits.length>0){const pose=hits[0].getPose(refSpace);reticle.visible=true;reticle.matrix.fromArray(pose.transform.matrix);pulseT+=dt*2.5;pulseRing.scale.setScalar(1+Math.sin(pulseT)*.3);pMat.opacity=(1-Math.sin(pulseT))*.45;}
      else{reticle.visible=false;}
    }
  }
  renderer.render(scene,camera);
});
</script>
</body>
</html>
